<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
      <script>  
    
    let taskList = [];

    const addTask = (task, callback) => {
      taskList.push(task);
      callback();
    };

    const printTasks = function () {
      console.log("Current Tasks:");
      taskList.forEach((task, index) => {
        console.log(`${index + 1}. ${task}`);
      });
    };

    function addMultipleTasks(...tasks) {
      tasks.forEach(task => taskList.push(task));
      console.log("Multiple tasks added.");
    }

    let outsideVariable = "I'm outside a function";

    function showScope() {
      let insideVariable = "I'm inside a function";
      console.log(outsideVariable);
      console.log(insideVariable);
    }

    addTask("Complete project", printTasks);
    addTask("Revise notes", printTasks);
    addMultipleTasks("Buy groceries", "Go jogging", "Read book");
    printTasks();
    showScope();
  </script>
</body>
</html>
